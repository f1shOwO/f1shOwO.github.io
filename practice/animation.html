<!DOCTYPE html>
<html lang="en">
<head>
	<title>The cake is a lie UwU</title>
<style>
canvas{
	border: 3px solid black;
}
</style>

</head>
<body>
	<canvas id="sergal" width=600 height=400>
	</canvas>
<script>
	const canvas = document.getElementById("sergal");
	const ctx = canvas.getContext("2d");

	let x = 0;
	let y = 0;
	let ys = 3;
	let xs = 3;

function animate(){
	requestAnimationFrame(animate);	
	ctx.clearRect(0,0,600,400);

	x += xs;
	y += ys;	

	if (x + 50 > 600 || x < 0) {
		xs = -xs;
	}

	if (y + 50 > 400 || y < 0) {
		ys = -ys;
	}

ctx.fillStyle = color();
ctx.fillRect(x,y,50,50);

}

function color() {
	return `hsl(${Math.random() * 360}, 100%, 50%)`;
}

animate();

</script>
</body>
</html>
